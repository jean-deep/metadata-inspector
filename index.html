<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic App Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }

        @keyframes pulse-soft {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .scanning {
            animation: pulse-soft 2s infinite;
        }
    </style>
</head>

<body class="min-h-screen text-slate-900">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg">
                    <i data-lucide="cpu" class="w-6 h-6 text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-800">Auto<span
                        class="text-blue-600">Scanner</span></h1>
            </div>

            <div class="flex items-center gap-4">
                <div id="scanStatus" class="hidden items-center gap-2 text-sm font-medium text-blue-600 scanning">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Scanning...
                </div>
                <div class="relative hidden md:block">
                    <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" placeholder="Filter discovered apps..."
                        class="pl-10 pr-4 py-2 bg-slate-100 border-transparent focus:bg-white focus:ring-2 focus:ring-blue-500 rounded-full text-sm w-64 transition-all outline-none">
                </div>
                <button onclick="startDiscovery()"
                    class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-800 transition-colors flex items-center gap-2">
                    <i data-lucide="search" class="w-4 h-4"></i> Rescan
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h2 class="text-3xl font-bold text-slate-900 mb-2">Network Discovery</h2>
                <p class="text-slate-500">Automatically detecting local services, VPS ports, and GitHub Pages.</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="githubUser" placeholder="GitHub Username"
                    class="px-4 py-2 rounded-lg border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="vpsIp" placeholder="VPS IP (Optional)"
                    class="px-4 py-2 rounded-lg border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <div id="appGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Discovered apps will appear here -->
        </div>

        <div id="emptyState" class="flex flex-col items-center justify-center py-20 text-center">
            <div class="bg-slate-100 p-6 rounded-full mb-4">
                <i data-lucide="radar" class="w-12 h-12 text-slate-400"></i>
            </div>
            <h3 class="text-lg font-semibold text-slate-900">Ready to Scan</h3>
            <p class="text-slate-500">Enter your info above and hit scan to discover your projects.</p>
        </div>
    </main>

    <script>
        let discoveredApps = [];
        const COMMON_PORTS = [3000, 5173, 8000, 8080, 4200, 3001, 5000];

        async function startDiscovery() {
            const githubUser = document.getElementById('githubUser').value.trim();
            const vpsIp = document.getElementById('vpsIp').value.trim();
            const statusIndicator = document.getElementById('scanStatus');

            discoveredApps = [];
            statusIndicator.classList.remove('hidden');
            statusIndicator.classList.add('flex');

            document.getElementById('appGrid').innerHTML = '';
            document.getElementById('emptyState').classList.add('hidden');

            const scanPromises = [];

            // 1. Scan Localhost
            COMMON_PORTS.forEach(port => {
                scanPromises.push(checkService(`http://localhost:${port}`, 'Local', 'monitor'));
            });

            // 2. Scan VPS (if provided)
            if (vpsIp) {
                scanPromises.push(checkService(`https://${vpsIp}`, 'VPS', 'server'));
                COMMON_PORTS.forEach(port => {
                    scanPromises.push(checkService(`https://${vpsIp}:${port}`, 'VPS', 'server'));
                });
            }

            // 3. Scan GitHub Pages
            if (githubUser) {
                scanPromises.push(fetchGithubPages(githubUser));
            }

            await Promise.all(scanPromises);

            statusIndicator.classList.add('hidden');
            statusIndicator.classList.remove('flex');

            if (discoveredApps.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
            }

            renderApps();
        }

        async function checkService(url, category, icon) {
            try {
                // Using 'no-cors' mode allows us to detect if a server is there 
                // even if it doesn't allow cross-origin requests. 
                // Note: fetch will still "fail" in some browsers but we can use timing or 
                // small resource probes. For local apps, often a simple fetch works.
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), 1500);

                await fetch(url, { mode: 'no-cors', signal: controller.signal });
                clearTimeout(id);

                addApp({
                    title: `${category} Service :${url.split(':').pop()}`,
                    description: `Active service detected at ${url}`,
                    url: url,
                    category: category,
                    icon: icon,
                    color: category === 'Local' ? 'text-emerald-600' : 'text-blue-600',
                    bgColor: category === 'Local' ? 'bg-emerald-100' : 'bg-blue-100'
                });
            } catch (e) {
                // Service likely not running
            }
        }

        async function fetchGithubPages(username) {
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos?per_page=100`);
                const repos = await response.json();

                repos.forEach(repo => {
                    if (repo.has_pages) {
                        addApp({
                            title: repo.name.replace(/-/g, ' '),
                            description: repo.description || "No description provided.",
                            url: `https://${username}.github.io/${repo.name}`,
                            category: 'Github Pages',
                            icon: 'github',
                            color: 'text-slate-700',
                            bgColor: 'bg-slate-200'
                        });
                    }
                });
            } catch (e) {
                console.error("GitHub API Error", e);
            }
        }

        function addApp(app) {
            // Avoid duplicates
            if (!discoveredApps.some(a => a.url === app.url)) {
                discoveredApps.push(app);
                renderApps();
            }
        }

        function createAppCard(app) {
            return `
                <div class="glass-card rounded-2xl p-6 flex flex-col h-full group">
                    <div class="flex justify-between items-start mb-4">
                        <div class="${app.bgColor} ${app.color} p-3 rounded-xl">
                            <i data-lucide="${app.icon}" class="w-6 h-6"></i>
                        </div>
                        <span class="category-badge px-2.5 py-1 rounded-full bg-slate-100 text-slate-500">
                            ${app.category}
                        </span>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 mb-2 group-hover:text-blue-600 transition-colors capitalize">
                        ${app.title}
                    </h3>
                    <p class="text-slate-500 text-sm leading-relaxed mb-6 flex-grow">
                        ${app.description}
                    </p>
                    <div class="flex items-center gap-3">
                        <a href="${app.url}" target="_blank" class="flex-grow inline-flex items-center justify-center gap-2 px-4 py-2.5 bg-slate-900 text-white text-sm font-semibold rounded-xl hover:bg-blue-600 transition-all">
                            Launch <i data-lucide="external-link" class="w-4 h-4"></i>
                        </a>
                        <button onclick="copyToClipboard('${app.url}')" class="p-2.5 bg-slate-100 text-slate-600 rounded-xl hover:bg-slate-200 transition-colors">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function renderApps() {
            const filter = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('appGrid');

            const filtered = discoveredApps.filter(app =>
                app.title.toLowerCase().includes(filter) ||
                app.category.toLowerCase().includes(filter)
            );

            grid.innerHTML = filtered.map(app => createAppCard(app)).join('');
            lucide.createIcons();
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        }

        document.getElementById('searchInput').addEventListener('input', renderApps);
        window.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>

</html>
